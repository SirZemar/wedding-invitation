services:
  - type: web
    name: wedding-invitation-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_PATH
        value: /var/data/wedding.db
    disk:
      name: wedding-data
      mountPath: /var/data
      sizeGB: 1
